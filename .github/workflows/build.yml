name: Build DrawAnywhere

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upload_release:
        description: Create and upload Release
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate temporary keystore
        run: |
          keytool -genkey -v -keystore app/release.jks -alias drawanywhere \
            -keyalg RSA -keysize 2048 -validity 3650 \
            -storepass temppass -keypass temppass \
            -dname "CN=DrawAnywhere, OU=Dev, O=taurusqh, L=Unknown, ST=Unknown, C=CN"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: temppass
          KEYSTORE_KEY_PASSWORD: temppass
          KEY_ALIAS: drawanywhere

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

  release:
    if: github.event_name == 'workflow_dispatch' && inputs.upload_release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-release-apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.3
          name: v1.0.3
          body: |
            ✨ DrawAnywhere v1.0.3

            - 修复安装权限问题：新增 REQUEST_INSTALL_PACKAGES 权限
            - 安装 APK 前自动弹窗引导用户授权
            - 修复编译错误（添加缺失的权限对话框方法）
          files: app-release.apk
          fail_on_unmatched_files: false
