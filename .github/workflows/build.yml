name: Build DrawAnywhere

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upload_release:
        description: Create and upload Release
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName = "' app/build.gradle.kts | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate temporary keystore
        run: |
          keytool -genkey -v -keystore app/release.jks -alias drawanywhere \
            -keyalg RSA -keysize 2048 -validity 3650 \
            -storepass temppass -keypass temppass \
            -dname "CN=DrawAnywhere, OU=Dev, O=taurusqh, L=Unknown, ST=Unknown, C=CN"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: temppass
          KEYSTORE_KEY_PASSWORD: temppass
          KEY_ALIAS: drawanywhere

      - name: Rename APK with version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/DrawAnywhere-v${VERSION}-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/release/DrawAnywhere-v*.apk

  release:
    if: github.event_name == 'workflow_dispatch' && inputs.upload_release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: ./apk

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName = "' app/build.gradle.kts | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ✨ DrawAnywhere v${{ steps.version.outputs.version }}

            ### 新增
            - 升级包页面 URL 显示，支持点击打开浏览器下载

            ### 修复
            - 修复 ZUI 设备上撤销操作崩溃问题（深拷贝 Stroke 对象避免共享引用）
            - 修复撤销/重做栈数据一致性问题

            ### 其他
            - 构建产物只包含 APK 文件，文件名包含版本号
          files: ./apk/*.apk
          fail_on_unmatched_files: false
