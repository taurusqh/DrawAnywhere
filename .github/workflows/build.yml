name: Build DrawAnywhere

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upload_release:
        description: '创建并上传到 Release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Generate temp keystore (if no secrets)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          keytool -genkey -v -keystore app/release.jks -alias drawanywhere             -keyalg RSA -keysize 2048 -validity 3650             -storepass temppass -keypass temppass             -dname "CN=DrawAnywhere, OU=Dev, O=taurusqh, L=Unknown, ST=Unknown, C=CN"
          echo "KEYSTORE_PASSWORD=temppass" >> $GITHUB_ENV
          echo "KEYSTORE_KEY_PASSWORD=temppass" >> $GITHUB_ENV
          echo "KEY_ALIAS=drawanywhere" >> $GITHUB_ENV

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || env.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD || env.KEYSTORE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || env.KEY_ALIAS }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.upload_release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.2
          name: v1.0.2
          body: |
            ## ✨ DrawAnywhere v1.0.2
            - 版本更新
            - 自动构建 CI 配置
          files: app-release.apk
          fail_on_unmatched_files: false
