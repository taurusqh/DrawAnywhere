name: Build DrawAnywhere

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upload_release:
        description: Create and upload Release
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore from secrets
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

  release:
    if: github.event_name == 'workflow_dispatch' && inputs.upload_release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-release-apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.3
          name: v1.0.3
          body: |
            ✨ DrawAnywhere v1.0.3

            - 新增安装权限处理（Android 8.0+）
            - 添加 REQUEST_INSTALL_PACKAGES 权限
            - 安装前自动弹窗引导用户授权
            - 使用正式签名文件构建
          files: app-release.apk
          fail_on_unmatched_files: false
